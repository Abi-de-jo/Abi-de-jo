<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
<defs>
  <!-- Gradients -->
  <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="30%" stop-color="#131022"/>
    <stop offset="70%" stop-color="#1a0b2e"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="ghostBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8b5cf6"/>
    <stop offset="100%" stop-color="#6d28d9"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    <stop offset="60%" stop-color="#6d28d9" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a0b2e"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8b5cf6"/>
    <stop offset="50%" stop-color="#c084fc"/>
    <stop offset="100%" stop-color="#8b5cf6"/>
  </linearGradient>

  <style>
    /* ── Animations ── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-8px) rotate(3deg); }
    }
    @keyframes glowPulse {
      0%, 100% { filter: drop-shadow(0 0 8px #8b5cf6); }
      50% { filter: drop-shadow(0 0 20px #c084fc); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 1; }
    }
    @keyframes cloudDrift {
      0% { transform: translateX(0); }
      100% { transform: translateX(-150px); }
    }
    @keyframes titleGlow {
      0%, 100% { fill: #c084fc; filter: drop-shadow(0 0 4px #8b5cf6); }
      50% { fill: #e9d5ff; filter: drop-shadow(0 0 16px #8b5cf6); }
    }
    @keyframes subtitleFade {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
      50% { transform: translateY(0); }
      70% { transform: translateY(-3px); }
    }
    @keyframes walkCycle {
      0% { transform: translateY(0) scaleX(1); }
      25% { transform: translateY(-3px) scaleX(1.02); }
      50% { transform: translateY(0) scaleX(1); }
      75% { transform: translateY(-2px) scaleX(0.98); }
      100% { transform: translateY(0) scaleX(1); }
    }
    @keyframes eyeBlink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }

    /* ── Classes ── */
    .star { animation: twinkle 3s ease-in-out infinite; }
    .star-fast { animation: twinkle 1.8s ease-in-out infinite; }
    .star-slow { animation: twinkle 4.5s ease-in-out infinite; }
    .cloud-layer { animation: cloudDrift 50s linear infinite; opacity: 0.1; }
    .cloud-fast { animation: cloudDrift 30s linear infinite; opacity: 0.06; }
    .float-ghost { animation: float 4s ease-in-out infinite, glowPulse 3s ease-in-out infinite; }
    .float-ghost2 { animation: float2 3.5s ease-in-out infinite, glowPulse 2.5s ease-in-out infinite; }
    .title-text { animation: titleGlow 3s ease-in-out infinite; }
    .sub-text { animation: subtitleFade 2.5s ease-in-out infinite; }
    .cursor-blink { animation: blink 1s step-end infinite; }
    .walk-char { animation: walkCycle 0.7s ease-in-out infinite; }
    .eye-blink { animation: eyeBlink 4s ease-in-out infinite; }
    .scanline-overlay {
      animation: scanline 4s linear infinite;
      background: linear-gradient(transparent 50%, rgba(139,92,246,0.03) 50%);
      background-size: 100% 4px;
      pointer-events: none;
    }
  </style>

  <!-- Character Sprite: Ghost Hunter Pixel Art -->
  <g id="hunter-sprite">
    <!-- Body -->
    <rect x="-8" y="0" width="16" height="18" rx="4" fill="#8b5cf6"/>
    <rect x="-8" y="0" width="16" height="18" rx="4" fill="none" stroke="#a78bfa" stroke-width="0.8"/>
    <!-- Belt -->
    <rect x="-8" y="10" width="16" height="2" fill="#6d28d9"/>
    <!-- Head -->
    <circle cx="0" cy="-10" r="9" fill="#c4b5fd"/>
    <circle cx="0" cy="-10" r="9" fill="none" stroke="#a78bfa" stroke-width="0.5"/>
    <!-- Hat (hunter cap) -->
    <path d="M-14,-14 L14,-14 L16,-22 L-16,-22 Z" fill="#6d28d9"/>
    <rect x="-12" y="-23" width="24" height="3" rx="1.5" fill="#8b5cf6"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-12" r="2" fill="#0d1117" class="eye-blink"/>
    <circle cx="4" cy="-12" r="2" fill="#0d1117" class="eye-blink" style="animation-delay:0.1s"/>
    <!-- Eye shine -->
    <circle cx="-3" cy="-13" r="0.7" fill="#ffffff"/>
    <circle cx="5" cy="-13" r="0.7" fill="#ffffff"/>
    <!-- Mouth (smile) -->
    <path d="M-3,-7 Q0,-4 3,-7" fill="none" stroke="#0d1117" stroke-width="1" stroke-linecap="round"/>
    <!-- Arms -->
    <rect x="-13" y="1" width="5" height="3" rx="1.5" fill="#8b5cf6"/>
    <rect x="8" y="1" width="5" height="3" rx="1.5" fill="#8b5cf6"/>
    <!-- Legs -->
    <rect x="-6" y="18" width="5" height="6" rx="1" fill="#6d28d9"/>
    <rect x="1" y="18" width="5" height="6" rx="1" fill="#6d28d9"/>
    <!-- Backpack -->
    <rect x="9" y="-2" width="5" height="8" rx="2" fill="#6d28d9" opacity="0.7"/>
    <!-- Ghost Net -->
    <line x1="12" y1="-5" x2="24" y2="-2" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="x2" values="24;28;24" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-2;0;-2" dur="2s" repeatCount="indefinite"/>
    </line>
    <circle cx="26" cy="-1" r="4" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.9">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Ghost Sprite -->
  <g id="ghost-sprite">
    <path d="M-12,0 A12,12 0 0,1 12,0 L12,20 Q8,24 4,20 Q0,24 -4,20 Q-8,24 -12,20 Z" fill="url(#ghostBody)" stroke="#a78bfa" stroke-width="0.8"/>
    <!-- Eyes -->
    <ellipse cx="-5" cy="-2" rx="3" ry="4" fill="#0d1117">
      <animate attributeName="ry" values="4;1;4" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="5" cy="-2" rx="3" ry="4" fill="#0d1117">
      <animate attributeName="ry" values="4;1;4" dur="5s" begin="0.2s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Eye shine -->
    <circle cx="-3" cy="-4" r="1.2" fill="#ffffff"/>
    <circle cx="7" cy="-4" r="1.2" fill="#ffffff"/>
    <!-- Mouth -->
    <ellipse cx="0" cy="4" rx="4" ry="3" fill="#0d1117"/>
  </g>

  <!-- ⭐ Star Coin -->
  <g id="star-coin">
    <text text-anchor="middle" dominant-baseline="central" font-size="14">⭐</text>
  </g>
</defs>

<!-- ── BACKGROUND ── -->
<rect width="900" height="300" fill="url(#skyGrad)"/>

<!-- ── STARS ── -->
<g fill="#c4b5fd">
  <circle cx="50" cy="30" r="1.5" class="star-fast"/>
  <circle cx="120" cy="18" r="1" class="star-slow"/>
  <circle cx="200" cy="45" r="1.8" class="star"/>
  <circle cx="280" cy="22" r="1.2" class="star-fast"/>
  <circle cx="350" cy="50" r="0.8" class="star-slow"/>
  <circle cx="450" cy="15" r="1.5" class="star"/>
  <circle cx="550" cy="35" r="1" class="star-fast"/>
  <circle cx="620" cy="20" r="1.8" class="star-slow"/>
  <circle cx="700" cy="48" r="1.2" class="star"/>
  <circle cx="780" cy="12" r="1.5" class="star-fast"/>
  <circle cx="850" cy="40" r="1" class="star-slow"/>
  <circle cx="80" cy="70" r="0.7" class="star"/>
  <circle cx="320" cy="80" r="0.9" class="star-fast"/>
  <circle cx="650" cy="75" r="0.8" class="star-slow"/>
  <circle cx="880" cy="65" r="1.1" class="star"/>
  <circle cx="160" cy="90" r="0.6" class="star-fast"/>
  <circle cx="500" cy="85" r="0.7" class="star-slow"/>
  <circle cx="420" cy="65" r="1" class="star"/>
  <circle cx="750" cy="90" r="0.8" class="star-fast"/>
  <circle cx="30" cy="110" r="0.6" class="star-slow"/>
</g>

<!-- ── MOON ── -->
<circle cx="800" cy="65" r="55" fill="url(#glow)"/>
<circle cx="800" cy="65" r="22" fill="#e9d5ff" opacity="0.9"/>
<circle cx="794" cy="60" r="22" fill="#131022" opacity="0.4"/>
<!-- Moon craters -->
<circle cx="805" cy="58" r="4" fill="#c4b5fd" opacity="0.3"/>
<circle cx="792" cy="70" r="3" fill="#c4b5fd" opacity="0.2"/>
<circle cx="810" cy="72" r="2.5" fill="#c4b5fd" opacity="0.25"/>

<!-- ── CLOUDS ── -->
<g class="cloud-layer">
  <circle cx="100" cy="95" r="25" fill="#c4b5fd"/>
  <circle cx="130" cy="85" r="20" fill="#c4b5fd"/>
  <circle cx="155" cy="95" r="22" fill="#c4b5fd"/>
</g>
<g class="cloud-fast">
  <circle cx="500" cy="100" r="20" fill="#c4b5fd"/>
  <circle cx="525" cy="92" r="16" fill="#c4b5fd"/>
  <circle cx="545" cy="98" r="18" fill="#c4b5fd"/>
</g>
<g class="cloud-layer" style="animation-delay: -20s;">
  <circle cx="700" cy="88" r="18" fill="#c4b5fd"/>
  <circle cx="722" cy="80" r="14" fill="#c4b5fd"/>
  <circle cx="740" cy="88" r="16" fill="#c4b5fd"/>
</g>

<!-- ── MOUNTAINS ── -->
<g opacity="0.08">
  <polygon points="0,220 60,140 120,220" fill="#8b5cf6"/>
  <polygon points="80,220 160,110 240,220" fill="#8b5cf6"/>
  <polygon points="200,220 300,130 400,220" fill="#8b5cf6"/>
  <polygon points="350,220 450,100 550,220" fill="#8b5cf6"/>
  <polygon points="500,220 600,120 700,220" fill="#8b5cf6"/>
  <polygon points="650,220 740,105 830,220" fill="#8b5cf6"/>
  <polygon points="780,220 870,135 900,220" fill="#8b5cf6"/>
</g>

<!-- ── GROUND ── -->
<rect x="0" y="230" width="900" height="70" fill="url(#groundGrad)"/>
<line x1="0" y1="230" x2="900" y2="230" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>

<!-- Ground detail: grid lines -->
<g stroke="#8b5cf6" stroke-width="0.3" opacity="0.05">
  <line x1="0" y1="245" x2="900" y2="245"/>
  <line x1="0" y1="260" x2="900" y2="260"/>
  <line x1="0" y1="275" x2="900" y2="275"/>
  <line x1="0" y1="290" x2="900" y2="290"/>
</g>

<!-- ── DECORATIVE CONTRIBUTION BLOCKS (background aesthetic) ── -->
<g opacity="0.15">
  <rect x="30" y="215" width="8" height="15" rx="1" fill="#39d353"/>
  <rect x="46" y="205" width="8" height="25" rx="1" fill="#26a641"/>
  <rect x="62" y="210" width="8" height="20" rx="1" fill="#006d32"/>
  <rect x="78" y="220" width="8" height="10" rx="1" fill="#0e4429"/>
  <rect x="94" y="208" width="8" height="22" rx="1" fill="#26a641"/>
</g>

<!-- ── GHOST RUNNING (left side decorative) ── -->
<g transform="translate(145, 185)" class="float-ghost2">
  <use href="#ghost-sprite" transform="scale(1.2)"/>
</g>

<!-- ── SMALL GHOST (top right) ── -->
<g transform="translate(720, 120) scale(0.7)" class="float-ghost" style="animation-delay: 1.5s">
  <use href="#ghost-sprite"/>
</g>

<!-- ── CHARACTER ── -->
<g transform="translate(180, 198)" class="walk-char">
  <use href="#hunter-sprite" transform="scale(1.1)"/>
</g>

<!-- ── CENTER GLOW ── -->
<circle cx="450" cy="140" r="130" fill="url(#glow)" opacity="0.3">
  <animate attributeName="r" values="120;150;120" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite"/>
</circle>

<!-- ── TITLE ── -->
<text x="450" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="900" class="title-text" letter-spacing="3">
  CodeByAbi
</text>

<!-- ── SUBTITLE ── -->
<text x="450" y="172" text-anchor="middle" font-family="monospace" font-size="14" fill="#a78bfa" class="sub-text" letter-spacing="4">
  FULL-STACK DEVELOPER
</text>

<!-- ── TAGLINE ── -->
<text x="450" y="193" text-anchor="middle" font-family="monospace" font-size="10" fill="#6d28d9" opacity="0.8">
  &lt; turning complex problems into clean code /&gt;
  <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
</text>

<!-- ── STATUS BAR ── -->
<rect x="250" y="210" width="400" height="18" rx="9" fill="#0d1117" stroke="#8b5cf6" stroke-width="0.8" opacity="0.6"/>
<text x="450" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">
  👻 Ghost Mode ACTIVE  |  ⚡ MERN Stack  |  🎯 Level: Enterprise
</text>

<!-- ── FLOATING COINS ── -->
<g transform="translate(600, 160)" class="float-ghost" style="animation-delay: 0.8s">
  <use href="#star-coin" transform="scale(1.2)">
    <animateTransform attributeName="transform" type="scale" values="1.2;1.4;1.2" dur="2s" repeatCount="indefinite"/>
  </use>
</g>
<g transform="translate(680, 175)" class="float-ghost" style="animation-delay: 2s">
  <use href="#star-coin">
    <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="1.8s" repeatCount="indefinite"/>
  </use>
</g>
<g transform="translate(300, 165)" class="float-ghost" style="animation-delay: 1.2s">
  <use href="#star-coin" transform="scale(0.8)">
    <animateTransform attributeName="transform" type="scale" values="0.8;1;0.8" dur="2.2s" repeatCount="indefinite"/>
  </use>
</g>

<!-- ── PRESS START INDICATOR ── -->
<text x="450" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#6d28d9" letter-spacing="3">
  [ PRESS START TO EXPLORE ]
  <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
</text>

<!-- ── BOTTOM DECORATION ── -->
<g opacity="0.12">
  <rect x="30" y="272" width="8" height="5" rx="1" fill="#39d353"/>
  <rect x="46" y="268" width="8" height="9" rx="1" fill="#26a641"/>
  <rect x="62" y="270" width="8" height="7" rx="1" fill="#006d32"/>
  <rect x="78" y="274" width="8" height="3" rx="1" fill="#0e4429"/>
  <rect x="810" y="270" width="8" height="7" rx="1" fill="#26a641"/>
  <rect x="826" y="274" width="8" height="3" rx="1" fill="#0e4429"/>
  <rect x="842" y="265" width="8" height="12" rx="1" fill="#39d353"/>
  <rect x="858" y="270" width="8" height="7" rx="1" fill="#006d32"/>
</g>

<!-- ── VERSION INFO ── -->
<text x="890" y="296" text-anchor="end" font-family="monospace" font-size="7" fill="#374151">
  v2.0 · ghost-runner
</text>

<!-- ── SCANLINE OVERLAY ── -->
<rect x="0" y="0" width="900" height="300" fill="url(#skyGrad)" opacity="0.03" style="mix-blend-mode: overlay;">
  <animate attributeName="opacity" values="0.02;0.04;0.02" dur="4s" repeatCount="indefinite"/>
</rect>
</svg>

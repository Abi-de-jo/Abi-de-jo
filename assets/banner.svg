<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abisheik horror banner">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="40%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#3d0a0a"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8a1a1a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8a1a1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="flicker">
      <feTurbulence baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
  </defs>

  <rect width="1200" height="220" fill="url(#sky)"/>

  <circle cx="950" cy="60" r="60" fill="url(#moonGlow)"/>
  <circle cx="950" cy="60" r="22" fill="#8a0000" opacity="0.9"/>
  <circle cx="956" cy="55" r="22" fill="#0a0000"/>

  <g fill="#ffffff" opacity="0.6">
    <circle cx="100" cy="30" r="0.8"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="50" r="0.6"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="20" r="0.7"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="40" r="0.5"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="580" cy="25" r="0.7"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="45" r="0.6"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="35" r="0.5"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="60" r="0.7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" repeatCount="indefinite"/></circle>
  </g>

  <g stroke="#1a0000" stroke-width="1" fill="none" opacity="0.8">
    <path d="M0,180 Q100,150 200,170 T400,160 T600,175 T800,165 T1000,170 T1200,160" stroke="#0a0000" stroke-width="2"/>
    <path d="M0,190 Q150,170 300,185 T600,180 T900,185 T1200,175" stroke="#1a0000" stroke-width="1.5"/>
    <path d="M0,200 Q200,185 400,195 T800,190 T1200,195" stroke="#0a0000" stroke-width="2"/>
  </g>

  <g fill="#000000" stroke="#0a0000" stroke-width="1">
    <path d="M0,220 L0,170 L30,170 L30,140 L60,140 L60,160 L90,160 L90,130 L120,130 L120,170 L150,170 L150,145 L180,145 L180,170 L210,170 L210,220 Z"/>
    <path d="M250,220 L250,180 L280,180 L280,150 L310,150 L310,170 L340,170 L340,140 L370,140 L370,180 L400,180 L400,220 Z"/>
    <path d="M1050,220 L1050,175 L1080,175 L1080,145 L1110,145 L1110,165 L1140,165 L1140,135 L1170,135 L1170,175 L1200,175 L1200,220 Z"/>
  </g>

  <g transform="translate(450, 80)">
    <path d="M0,140 L0,80 L30,80 L30,40 L60,20 L90,40 L90,80 L120,80 L120,140 Z" fill="#000000" stroke="#1a0000" stroke-width="1.5"/>
    <path d="M60,20 L75,0 L90,20" fill="#000000" stroke="#1a0000" stroke-width="1.5"/>
    <rect x="40" y="80" width="8" height="15" fill="#3d0000">
      <animate attributeName="fill" values="#3d0000;#8a0000;#3d0000" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="75" y="80" width="8" height="15" fill="#3d0000">
      <animate attributeName="fill" values="#3d0000;#8a0000;#3d0000" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="110" width="22" height="30" fill="#000000"/>
    <rect x="55" y="115" width="12" height="20" fill="#1a0000"/>
  </g>

  <g fill="#000000" opacity="0.9">
    <ellipse cx="50" cy="200" rx="15" ry="3"/>
    <ellipse cx="200" cy="200" rx="12" ry="2.5"/>
    <ellipse cx="380" cy="200" rx="14" ry="3"/>
    <ellipse cx="780" cy="200" rx="13" ry="2.5"/>
    <ellipse cx="1000" cy="200" rx="15" ry="3"/>
  </g>

  <g transform="translate(380, 25)">
    <text font-family="Courier New, monospace" font-weight="bold" font-size="48" fill="#8a0000" letter-spacing="6">
      ABISHEIK
      <animate attributeName="fill" values="#8a0000;#cc0000;#8a0000" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
    </text>
  </g>

  <g transform="translate(440, 60)">
    <text font-family="Courier New, monospace" font-size="11" fill="#5a0000" letter-spacing="3">FULL-STACK DEVELOPER</text>
  </g>

  <g fill="#0a0000" opacity="0.6">
    <path d="M0,215 Q300,210 600,215 T1200,213 L1200,220 L0,220 Z"/>
  </g>
</svg>

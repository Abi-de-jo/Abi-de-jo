<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" role="img" aria-label="CodeByAbi Ghost Banner">
  <defs>
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#131022"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6d28d9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style><![CDATA[
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes fade {
      0%, 100% { opacity: 1; }
      45% { opacity: 1; }
      50% { opacity: 0.15; }
      55% { opacity: 1; }
    }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      94%, 98% { transform: scaleY(0.1); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.45; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(1.12); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 1; }
    }
    @keyframes badgeHide {
      0%, 30% { opacity: 1; transform: translateX(0); }
      35%, 50% { opacity: 0; transform: translateX(20px); }
      55%, 100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes bracketDrift {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-6px); opacity: 0.9; }
    }
    @keyframes textGlow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(139,92,246,0.4)); }
      50% { filter: drop-shadow(0 0 10px rgba(139,92,246,0.9)); }
    }
    .ghost-group {
      transform-origin: 450px 150px;
      animation: float 4s ease-in-out infinite, fade 6s ease-in-out infinite;
    }
    .eye {
      transform-origin: center;
      transform-box: fill-box;
      animation: blink 5s ease-in-out infinite;
    }
    .glow {
      transform-origin: 450px 140px;
      animation: pulseGlow 3s ease-in-out infinite;
    }
    .star {
      animation: twinkle 3s ease-in-out infinite;
    }
    .star.s2 { animation-delay: 0.6s; }
    .star.s3 { animation-delay: 1.2s; }
    .star.s4 { animation-delay: 1.8s; }
    .star.s5 { animation-delay: 2.4s; }
    .badge {
      transform-origin: center;
      transform-box: fill-box;
      animation: badgeHide 8s ease-in-out infinite;
    }
    .bracket {
      animation: bracketDrift 5s ease-in-out infinite;
    }
    .bracket.right { animation-delay: 1s; }
    .title {
      animation: textGlow 4s ease-in-out infinite;
    }
  ]]></style>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)"/>

  <!-- Twinkling stars -->
  <g fill="#c4b5fd">
    <circle class="star" cx="60"  cy="40"  r="1.4"/>
    <circle class="star s2" cx="120" cy="220" r="1.2"/>
    <circle class="star s3" cx="180" cy="60"  r="1.6"/>
    <circle class="star s4" cx="80"  cy="150" r="1.0"/>
    <circle class="star s5" cx="220" cy="200" r="1.3"/>
    <circle class="star" cx="320" cy="30"  r="1.1"/>
    <circle class="star s2" cx="380" cy="240" r="1.4"/>
    <circle class="star s3" cx="520" cy="50"  r="1.2"/>
    <circle class="star s4" cx="600" cy="220" r="1.5"/>
    <circle class="star s5" cx="680" cy="35"  r="1.0"/>
    <circle class="star" cx="740" cy="180" r="1.3"/>
    <circle class="star s2" cx="820" cy="80"  r="1.4"/>
    <circle class="star s3" cx="860" cy="220" r="1.1"/>
    <circle class="star s4" cx="450" cy="20"  r="1.2"/>
    <circle class="star s5" cx="40"  cy="100" r="1.0"/>
    <circle class="star" cx="880" cy="150" r="1.2"/>
    <circle class="star s3" cx="280" cy="120" r="0.9"/>
    <circle class="star s4" cx="620" cy="130" r="0.9"/>
  </g>

  <!-- Code line at top -->
  <text x="450" y="28" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#6d28d9" opacity="0.7">
    while(true) { code() }
  </text>

  <!-- Decorative brackets -->
  <text class="bracket" x="55" y="160" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="40" fill="#8b5cf6" opacity="0.5">{</text>
  <text class="bracket right" x="825" y="160" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="40" fill="#8b5cf6" opacity="0.5">}</text>

  <!-- GHOST MODE badge (top-right) -->
  <g class="badge" transform="translate(720, 60)">
    <rect x="0" y="0" width="130" height="26" rx="13" fill="#0d1117" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="14" cy="13" r="4" fill="#8b5cf6"/>
    <text x="28" y="18" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#c4b5fd" font-weight="700" letter-spacing="1.5">GHOST MODE</text>
  </g>

  <!-- Code brackets < / > around ghost -->
  <text x="290" y="165" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="48" fill="#8b5cf6" opacity="0.85" font-weight="700">&lt;</text>
  <text x="610" y="165" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="48" fill="#8b5cf6" opacity="0.85" font-weight="700">/&gt;</text>

  <!-- Pulsing glow behind ghost -->
  <circle class="glow" cx="450" cy="140" r="110" fill="url(#glowGrad)"/>

  <!-- Ghost -->
  <g class="ghost-group">
    <g filter="url(#softGlow)">
      <path d="
        M 395 165
        L 395 100
        A 55 55 0 0 1 505 100
        L 505 165
        L 495 155
        L 485 165
        L 475 155
        L 465 165
        L 455 155
        L 445 165
        L 435 155
        L 425 165
        L 415 155
        L 405 165
        Z" fill="url(#ghostGrad)"/>
    </g>

    <!-- Eyes -->
    <ellipse class="eye" cx="430" cy="115" rx="7" ry="10" fill="#0d1117"/>
    <ellipse class="eye" cx="470" cy="115" rx="7" ry="10" fill="#0d1117"/>
    <!-- Eye highlights -->
    <circle cx="432" cy="112" r="2" fill="#ffffff"/>
    <circle cx="472" cy="112" r="2" fill="#ffffff"/>

    <!-- Small smile -->
    <path d="M 440 138 Q 450 145 460 138" stroke="#0d1117" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Cheek glow -->
    <circle cx="418" cy="128" r="4" fill="#c4b5fd" opacity="0.5"/>
    <circle cx="482" cy="128" r="4" fill="#c4b5fd" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text class="title" x="450" y="232" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="32" font-weight="800" fill="#ffffff" letter-spacing="2">CodeByAbi</text>

  <!-- Subtitle -->
  <text x="450" y="256" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="1">Full-Stack Developer &amp; MERN Specialist</text>
</svg>

name: 👻 Ghost Hunt Game

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: Abi-de-jo
          outputs: |
            assets/ghost-hunt-game.svg?palette=github-dark

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Transform snake into ghost hunt
        run: |
          python3 scripts/ghost-hunt.py

      - name: Commit game output
        run: |
          git config user.name "👻 Ghost Hunter"
          git config user.email "ghost-hunter@ghosts.com"
          git add assets/ghost-hunt-game.svg
          git commit -m "👻 Ghost Hunt: new game state" || echo "No changes"
          git push

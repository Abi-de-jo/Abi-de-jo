<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="horror tech stack">
  <rect width="800" height="240" fill="#0a0000"/>

  <g font-family="Courier New, monospace" font-size="13" fill="#5a0000">
    <text x="20" y="25" letter-spacing="3" font-weight="bold" font-size="14" fill="#8a0000">[ FRONTEND ]</text>
    <line x1="20" y1="32" x2="780" y2="32" stroke="#3a0000" stroke-width="0.5"/>
    <text x="20" y="55">REACT         // component-based UI</text>
    <text x="20" y="75">NEXT.JS       // server-rendered react</text>
    <text x="20" y="95">TYPESCRIPT    // type-safe JavaScript</text>
    <text x="20" y="115">TAILWIND CSS  // utility-first styling</text>
    <text x="20" y="135">HTML5 / CSS3  // markup foundation</text>

    <text x="410" y="25" letter-spacing="3" font-weight="bold" font-size="14" fill="#8a0000">[ BACKEND ]</text>
    <line x1="410" y1="32" x2="780" y2="32" stroke="#3a0000" stroke-width="0.5"/>
    <text x="410" y="55">NODE.JS       // runtime environment</text>
    <text x="410" y="75">EXPRESS       // REST API framework</text>
    <text x="410" y="95">GRAPHQL       // query language</text>
    <text x="410" y="115">PYTHON        // scripting + automation</text>
    <text x="410" y="135">FASTAPI       // async Python APIs</text>
  </g>

  <g font-family="Courier New, monospace" font-size="13" fill="#5a0000">
    <text x="20" y="165" letter-spacing="3" font-weight="bold" font-size="14" fill="#8a0000">[ DATA ]</text>
    <line x1="20" y1="172" x2="380" y2="172" stroke="#3a0000" stroke-width="0.5"/>
    <text x="20" y="195">POSTGRESQL    // relational database</text>
    <text x="20" y="215">MONGODB       // document store</text>
    <text x="20" y="235" opacity="0">-</text>

    <text x="410" y="165" letter-spacing="3" font-weight="bold" font-size="14" fill="#8a0000">[ INFRA ]</text>
    <line x1="410" y1="172" x2="780" y2="172" stroke="#3a0000" stroke-width="0.5"/>
    <text x="410" y="195">DOCKER        // containerization</text>
    <text x="410" y="215">REDIS         // caching layer</text>
    <text x="410" y="235" opacity="0">-</text>
  </g>
</svg>

<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="horror full-page background">
  <defs>
    <linearGradient id="horrorSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="50%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#2a0808"/>

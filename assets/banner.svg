<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" width="1000" height="240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="240">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0f0520"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="1000" y2="0">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1000" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="240" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid dots -->
  <g fill="#a855f7" opacity="0.04">
    <circle cx="50" cy="30" r="1.5"/><circle cx="150" cy="30" r="1.5"/>
    <circle cx="250" cy="30" r="1.5"/><circle cx="350" cy="30" r="1.5"/>
    <circle cx="450" cy="30" r="1.5"/><circle cx="550" cy="30" r="1.5"/>
    <circle cx="650" cy="30" r="1.5"/><circle cx="750" cy="30" r="1.5"/>
    <circle cx="850" cy="30" r="1.5"/><circle cx="950" cy="30" r="1.5"/>
    <circle cx="50" cy="70" r="1.5"/><circle cx="150" cy="70" r="1.5"/>
    <circle cx="250" cy="70" r="1.5"/><circle cx="350" cy="70" r="1.5"/>
    <circle cx="450" cy="70" r="1.5"/><circle cx="550" cy="70" r="1.5"/>
    <circle cx="650" cy="70" r="1.5"/><circle cx="750" cy="70" r="1.5"/>
    <circle cx="850" cy="70" r="1.5"/><circle cx="950" cy="70" r="1.5"/>
    <circle cx="50" cy="110" r="1.5"/><circle cx="150" cy="110" r="1.5"/>
    <circle cx="250" cy="110" r="1.5"/><circle cx="350" cy="110" r="1.5"/>
    <circle cx="450" cy="110" r="1.5"/><circle cx="550" cy="110" r="1.5"/>
    <circle cx="650" cy="110" r="1.5"/><circle cx="750" cy="110" r="1.5"/>
    <circle cx="850" cy="110" r="1.5"/><circle cx="950" cy="110" r="1.5"/>
    <circle cx="50" cy="150" r="1.5"/><circle cx="150" cy="150" r="1.5"/>
    <circle cx="250" cy="150" r="1.5"/><circle cx="350" cy="150" r="1.5"/>
    <circle cx="450" cy="150" r="1.5"/><circle cx="550" cy="150" r="1.5"/>
    <circle cx="650" cy="150" r="1.5"/><circle cx="750" cy="150" r="1.5"/>
    <circle cx="850" cy="150" r="1.5"/><circle cx="950" cy="150" r="1.5"/>
    <circle cx="50" cy="190" r="1.5"/><circle cx="150" cy="190" r="1.5"/>
    <circle cx="250" cy="190" r="1.5"/><circle cx="350" cy="190" r="1.5"/>
    <circle cx="450" cy="190" r="1.5"/><circle cx="550" cy="190" r="1.5"/>
    <circle cx="650" cy="190" r="1.5"/><circle cx="750" cy="190" r="1.5"/>
    <circle cx="850" cy="190" r="1.5"/><circle cx="950" cy="190" r="1.5"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="200" r="120" fill="#a855f7" opacity="0.04"/>
  <circle cx="900" cy="40" r="80" fill="#06b6d4" opacity="0.04"/>

  <!-- Code decorations - left -->
  <text x="40" y="55" font-family="'Fira Code', monospace" font-size="11" fill="#a855f7" opacity="0.12">&lt;!-- dev --&gt;</text>
  <text x="40" y="75" font-family="'Fira Code', monospace" font-size="10" fill="#06b6d4" opacity="0.10">  import { Build } from 'web';</text>
  <text x="40" y="92" font-family="'Fira Code', monospace" font-size="10" fill="#c084fc" opacity="0.10">  const app = await Build();</text>
  <text x="40" y="109" font-family="'Fira Code', monospace" font-size="10" fill="#a855f7" opacity="0.10">  app.deploy(); // 🚀</text>
  <text x="40" y="129" font-family="'Fira Code', monospace" font-size="11" fill="#a855f7" opacity="0.12">&lt;!-- /dev --&gt;</text>

  <!-- Code decorations - right -->
  <text x="770" y="125" font-family="'Fira Code', monospace" font-size="11" fill="#a855f7" opacity="0.12">// philosophy</text>
  <text x="770" y="145" font-family="'Fira Code', monospace" font-size="10" fill="#06b6d4" opacity="0.10">clean &gt; clever</text>
  <text x="770" y="162" font-family="'Fira Code', monospace" font-size="10" fill="#c084fc" opacity="0.10">// always</text>

  <!-- Main title with glow -->
  <text x="500" y="110" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="56" font-weight="700" fill="url(#titleGrad)" filter="url(#glow)">CodeByAbi</text>

  <!-- Underline glow bar -->
  <rect x="350" y="130" width="300" height="3" rx="1.5" fill="url(#glowLine)" filter="url(#softGlow)"/>

  <!-- Subtitle -->
  <text x="500" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" letter-spacing="5">FULL-STACK DEVELOPER · MERN · OPEN SOURCE</text>

  <!-- Bottom accent dots -->
  <circle cx="360" cy="185" r="2.5" fill="#a855f7" opacity="0.5"/>
  <circle cx="370" cy="185" r="2.5" fill="#c084fc" opacity="0.4"/>
  <circle cx="380" cy="185" r="2.5" fill="#06b6d4" opacity="0.3"/>
  <circle cx="620" cy="185" r="2.5" fill="#06b6d4" opacity="0.3"/>
  <circle cx="630" cy="185" r="2.5" fill="#c084fc" opacity="0.4"/>
  <circle cx="640" cy="185" r="2.5" fill="#a855f7" opacity="0.5"/>
</svg>
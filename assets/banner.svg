<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#11051f"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="900" y2="0" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="20" x2="900" y2="20" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="900" y2="40" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="900" y2="60" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="900" y2="100" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="900" y2="140" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="220" x2="900" y2="220" stroke="#a855f7" stroke-width="0.5"/>
  </g>

  <!-- Glow accents -->
  <ellipse cx="450" cy="220" rx="350" ry="80" fill="url(#glow)"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="40" r="60" fill="url(#accent2)"/>
  <circle cx="820" cy="180" r="50" fill="url(#accent2)"/>

  <!-- Decorative code brackets -->
  <text x="50" y="60" font-family="'Fira Code', monospace" font-size="14" fill="#a855f7" opacity="0.15">&lt;code&gt;</text>
  <text x="50" y="80" font-family="'Fira Code', monospace" font-size="12" fill="#c084fc" opacity="0.1">  const dev = new Developer();</text>
  <text x="50" y="100" font-family="'Fira Code', monospace" font-size="12" fill="#06b6d4" opacity="0.1">  dev.build("web"); // always</text>
  <text x="50" y="120" font-family="'Fira Code', monospace" font-size="14" fill="#a855f7" opacity="0.15">&lt;/code&gt;</text>

  <!-- Right side decorative code -->
  <text x="720" y="100" font-family="'Fira Code', monospace" font-size="12" fill="#a855f7" opacity="0.1">// clean code</text>
  <text x="720" y="120" font-family="'Fira Code', monospace" font-size="12" fill="#06b6d4" opacity="0.1">// &gt; clever code</text>

  <!-- Main title -->
  <text x="450" y="110" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="52" font-weight="700" fill="url(#accent1)" filter="url(#glowFilter)">CodeByAbi</text>

  <!-- Subtitle -->
  <text x="450" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#6b7280" letter-spacing="6">FULL-STACK · MERN · OPEN SOURCE</text>

  <!-- Bottom accent line -->
  <rect x="300" y="165" width="300" height="2" rx="1" fill="url(#accent1)" opacity="0.5"/>

  <!-- Small decorative dots -->
  <circle cx="300" cy="166" r="2" fill="#a855f7"/>
  <circle cx="600" cy="166" r="2" fill="#06b6d4"/>
</svg>
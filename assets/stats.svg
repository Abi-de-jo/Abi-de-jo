<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="horror stats">
  <rect width="800" height="160" fill="#0a0000"/>

  <g font-family="Courier New, monospace" fill="#8a0000">
    <text x="400" y="25" text-anchor="middle" font-size="11" letter-spacing="6">[ GITHUB STATISTICS ]</text>
    <line x1="200" y1="35" x2="600" y2="35" stroke="#3a0000" stroke-width="0.5"/>
  </g>

  <g font-family="Courier New, monospace" font-size="11" fill="#5a0000">
    <text x="100" y="75" text-anchor="middle">
      <tspan font-size="28" font-weight="bold" fill="#cc0000">64</tspan>
      <tspan x="100" dy="20">REPOSITORIES</tspan>
    </text>
    <text x="300" y="75" text-anchor="middle">
      <tspan font-size="28" font-weight="bold" fill="#cc0000">1,276</tspan>
      <tspan x="300" dy="20">COMMITS</tspan>
    </text>
    <text x="500" y="75" text-anchor="middle">
      <tspan font-size="28" font-weight="bold" fill="#cc0000">163</tspan>
      <tspan x="500" dy="20">FOLLOWERS</tspan>
    </text>
    <text x="700" y="75" text-anchor="middle">
      <tspan font-size="28" font-weight="bold" fill="#cc0000">6</tspan>
      <tspan x="700" dy="20">STARS</tspan>
    </text>
  </g>

  <line x1="100" y1="120" x2="700" y2="120" stroke="#3a0000" stroke-width="0.5"/>

  <g font-family="Courier New, monospace" font-size="10" fill="#3a0000" text-anchor="middle">
    <text x="100" y="140">JAVASCRIPT 23</text>
    <text x="300" y="140">TYPESCRIPT 11</text>
    <text x="500" y="140">HTML 8</text>
    <text x="700" y="140">CSS / PYTHON 5</text>
  </g>
</svg>
